<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>846D8 Pro - Truy Tìm Kho Báu Lịch Sử 12</title>
    <style>
        :root {
            --primary: #8b1e0f;
            --secondary: #d4af37;
            --dark: #1a1a1a;
            --light: #f4eae1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 850px;
            background: #2c3e50;
            border: 4px solid var(--secondary);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Màn hình chờ */
        #start-screen {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1578328819058-b69f3a3b0f6b?q=80&w=600') center/cover;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        h1.title {
            color: var(--secondary);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px #000;
            font-weight: 900;
        }

        .btn {
            background: var(--primary);
            color: var(--secondary);
            border: 2px solid var(--secondary);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Thanh trạng thái phía trên */
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--secondary);
            z-index: 5;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Khu vực Bản đồ Game */
        #game-map {
            flex: 1;
            position: relative;
            background: radial-gradient(circle, #34495e 20%, #2c3e50 80%);
            overflow: hidden;
        }

        /* Lưới định vị giả lập bản đồ cổ */
        #game-map::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(212,175,55,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(212,175,55,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Nhân vật chính (Player) */
        #player {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #e74c3c;
            border: 2px solid #fff;
            border-radius: 50%;
            transition: left 0.1s linear, top 0.1s linear;
            z-index: 4;
            box-shadow: 0 0 10px #e74c3c;
        }

        #player::after {
            content: '🤠';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* Điểm mốc / NPC */
        .landmark {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 3;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255,255,255,0.5)); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 8px var(--secondary)); }
        }

        .landmark.completed {
            filter: grayscale(1) opacity(0.6);
            animation: none;
        }

        /* Bộ điều khiển ảo (D-Pad Mobile) */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            justify-content: center;
            align-content: center;
            padding: 15px;
            background: rgba(26, 26, 26, 0.9);
            border-top: 2px solid var(--secondary);
            z-index: 5;
        }

        .ctrl-btn {
            background: #333;
            border: 2px solid #555;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
        }

        .ctrl-btn:active {
            background: var(--secondary);
            color: var(--dark);
            border-color: #fff;
        }

        /* Popup thông báo & câu hỏi */
        .modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .modal-content {
            background: var(--light);
            color: var(--dark);
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 380px;
            border: 3px solid var(--secondary);
        }

        .npc-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 10px;
        }

        .npc-avatar {
            font-size: 2.5rem;
        }

        .npc-name {
            font-weight: bold;
            color: var(--primary);
            text-align: left;
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: left;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #ccc;
            padding: 10px 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-btn:active {
            background: #e0e0e0;
        }

        /* Hiệu ứng pháo hoa */
        #canvas-fw {
            position: absolute;
            inset: 0;
            z-index: 30;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="start-screen">
        <h1 class="title">846D8 PRO</h1>
        <p style="color: var(--secondary); font-weight: bold; letter-spacing: 2px;">TRUY TÌM KHO BÁU LỊCH SỬ 12</p>
        <p style="margin-top: 15px; font-size: 0.9rem; max-width: 300px; opacity: 0.8;">Vượt qua các mốc lịch sử, trả lời câu hỏi từ các NPC để thu thập Mảnh Ký Ức trước khi hết giờ!</p>
        <button class="btn" onclick="startGame()">KHỞI HÀNH 🧭</button>
    </div>

    <div id="hud">
        <div class="hud-item">⏱️ <span id="timer">180</span>s</div>
        <div class="hud-item" style="color: var(--secondary);">💎 <span id="score">0</span>/5 Mảnh</div>
    </div>

    <div id="game-map">
        <div id="player"></div>
        </div>

    <div id="controls">
        <div></div>
        <div class="ctrl-btn" onpointerdown="move('up')">▲</div>
        <div></div>
        <div class="ctrl-btn" onpointerdown="move('left')">◀</div>
        <div class="ctrl-btn" style="background: #222; font-size: 1rem; color: #777;">🌟</div>
        <div class="ctrl-btn" onpointerdown="move('right')">▶</div>
        <div></div>
        <div class="ctrl-btn" onpointerdown="move('down')">▼</div>
        <div></div>
    </div>

    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <div class="npc-header">
                <div class="npc-avatar" id="npc-icon">👤</div>
                <div class="npc-name">
                    <div id="npc-title" style="font-size: 0.8rem; color: #666;">Người dẫn đường</div>
                    <div id="npc-character" style="font-size: 1.1rem;">NPC Lịch Sử</div>
                </div>
            </div>
            <div class="question-text" id="question-content">Đang tải câu hỏi...</div>
            <div class="options-grid" id="options-container"></div>
        </div>
    </div>

    <div id="end-modal" class="modal">
        <div class="modal-content" style="background: var(--dark); color: white;">
            <h2 id="end-title" style="color: var(--secondary); font-size: 2rem; margin-bottom: 15px;">CHIẾN THẮNG!</h2>
            <p id="end-message" style="margin-bottom: 20px;">Bạn đã xuất sắc thu thập đủ các mảnh ký ức lịch sử!</p>
            <button class="btn" onclick="location.reload()">CHƠI LẠI 🔄</button>
        </div>
    </div>

    <canvas id="canvas-fw"></canvas>
</div>

<script>
    // Giả lập hệ thống âm thanh bằng AudioContext (Không lo lỗi bảo mật trình duyệt chặn file .mp3)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } else if (type === 'wrong') {
            osc.frequency.setValueAtTime(220, audioCtx.currentTime); // A3
            osc.frequency.setValueAtTime(147, audioCtx.currentTime + 0.1); // D3
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'click') {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        } else if (type === 'win') {
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
            osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    // Dữ liệu màn chơi & câu hỏi Lịch Sử 12
    const landmarksData = [
        {
            id: 1, name: "Hội nghị Thành lập Đảng (1930)", icon: "🚩", npc: "Lãnh tụ Nguyễn Ái Quốc", x: 60, y: 50,
            q: "Ai là người chủ trì Hội nghị thành lập Đảng Cộng sản Việt Nam đầu năm 1930?",
            a: ["Nguyễn Ai Quốc", "Trần Phú", "Lê Hồng Phong", "Nguyễn Văn Cừ"], correct: 0
        },
        {
            id: 2, name: "Cách mạng Tháng Tám (1945)", icon: "🏛️", npc: "Đồng chí Võ Nguyên Giáp", x: 280, y: 110,
            q: "Sự kiện lịch sử nào trực tiếp dẫn đến thắng lợi của Cách mạng tháng Tám năm 1945?",
            a: ["Nhật đảo chính Pháp", "Nhật đầu hàng Đồng minh vô điều kiện", "Khởi nghĩa Bắc Sơn", "Hội nghị tổng khởi nghĩa"], correct: 1
        },
        {
            id: 3, name: "Chiến dịch Điện Biên Phủ (1954)", icon: "⛰️", npc: "Chiến sĩ Điện Biên", x: 100, y: 220,
            q: "Khẩu hiệu chiến lược của ta trong Chiến dịch Điện Biên Phủ 1954 là gì?",
            a: ["Đánh nhanh thắng nhanh", "Tất cả cho tiền tuyến, tất cả để chiến thắng", "Phá tan cuộc tấn công của Pháp", "Thần tốc, táo bạo, bất ngờ"], correct: 1
        },
        {
            id: 4, name: "Hiệp định Giơ-nevơ (1954)", icon: "✍️", npc: "Nhà ngoại giao", x: 300, y: 290,
            q: "Theo Hiệp định Giơ-nevơ 1954, vĩ tuyến nào được chọn làm giới tuyến quân sự tạm thời?",
            a: ["Vĩ tuyến 13", "Vĩ tuyến 15", "Vĩ tuyến 17", "Vĩ tuyến 20"], correct: 2
        },
        {
            id: 5, name: "Chiến dịch Hồ Chí Minh (1975)", icon: "⭐️", npc: "Giải phóng quân", x: 180, y: 400,
            q: "Chiến dịch Hồ Chí Minh lịch sử giải phóng hoàn toàn miền Nam kết thúc vào ngày nào?",
            a: ["30/04/1975", "29/03/1975", "11/03/1975", "02/05/1975"], correct: 0
        }
    ];

    // Trạng thái Game
    let playerPos = { x: 200, y: 460 };
    let score = 0;
    let timeLeft = 180;
    let timerInterval;
    let activeNpc = null;
    let gameActive = false;

    const playerEl = document.getElementById('player');
    const mapEl = document.getElementById('game-map');

    // Khởi tạo các mốc lịch sử lên bản đồ
    function initMap() {
        landmarksData.forEach(loc => {
            const div = document.createElement('div');
            div.className = 'landmark';
            div.id = `node-${loc.id}`;
            div.style.left = `${loc.x}px`;
            div.style.top = `${loc.y}px`;
            div.innerHTML = loc.icon;
            div.title = loc.name;
            mapEl.appendChild(div);
        });
    }

    // Cập nhật vị trí hiển thị của người chơi
    function updatePlayerDOM() {
        playerEl.style.left = `${playerPos.x}px`;
        playerEl.style.top = `${playerPos.y}px`;
        checkCollision();
    }

    // Logic di chuyển (hỗ trợ cả d-pad và bàn phím)
    function move(direction) {
        if (!gameActive) return;
        const step = 15;
        const maxW = mapEl.clientWidth - 32;
        const maxH = mapEl.clientHeight - 32;

        if (direction === 'up' && playerPos.y > 0) playerPos.y -= step;
        if (direction === 'down' && playerPos.y < maxH) playerPos.y += step;
        if (direction === 'left' && playerPos.x > 0) playerPos.x -= step;
        if (direction === 'right' && playerPos.x < maxW) playerPos.x += step;

        updatePlayerDOM();
    }

    // Lắng nghe bàn phím (WASD / Mũi tên)
    window.addEventListener('keydown', (e) => {
        if (['ArrowUp', 'w', 'W'].includes(e.key)) move('up');
        if (['ArrowDown', 's', 'S'].includes(e.key)) move('down');
        if (['ArrowLeft', 'a', 'A'].includes(e.key)) move('left');
        if (['ArrowRight', 'd', 'D'].includes(e.key)) move('right');
    });

    // Kiểm tra va chạm giữa Người chơi và các Mốc lịch sử
    function checkCollision() {
        landmarksData.forEach(loc => {
            const node = document.getElementById(`node-${loc.id}`);
            if (node.classList.contains('completed')) return;

            // Tính khoảng cách hình học giữa tâm nhân vật và mốc tọa độ
            const distance = Math.hypot((playerPos.x + 16) - (loc.x + 20), (playerPos.y + 16) - (loc.y + 20));
            if (distance < 28) {
                openQuiz(loc);
            }
        });
    }

    // Mở bảng câu hỏi tương tác từ NPC
    function openQuiz(loc) {
        gameActive = false;
        activeNpc = loc;
        
        document.getElementById('npc-icon').innerHTML = loc.icon;
        document.getElementById('npc-character').innerHTML = loc.npc;
        document.getElementById('question-content').innerHTML = `<b>[${loc.name}]</b><br><br>${loc.q}`;
        
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = '';
        
        loc.a.forEach((ans, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65 + idx)}. ${ans}`;
            btn.onclick = () => checkAnswer(idx);
            optContainer.appendChild(btn);
        });

        document.getElementById('quiz-modal').style.display = 'flex';
    }

    // Kiểm tra đáp án trắc nghiệm
    function checkAnswer(chosenIdx) {
        document.getElementById('quiz-modal').style.display = 'none';
        
        if (chosenIdx === activeNpc.correct) {
            playSound('correct');
            score++;
            document.getElementById('score').innerText = score;
            document.getElementById(`node-${activeNpc.id}`).classList.add('completed');
            alert(`Chính xác! Bạn đã nhận được 1 Mảnh Ký Ức từ: ${activeNpc.npc}`);
            
            if (score === landmarksData.length) {
                endGame(true);
                return;
            }
        } else {
            playSound('wrong');
            timeLeft -= 15; // Phạt trừ thời gian khi trả lời sai
            alert("Sai rồi! Hãy xem lại kiến thức Sách giáo khoa và thử tiếp cận lại.");
        }
        
        gameActive = true;
    }

    // Bắt đầu Trò chơi
    function startGame() {
        playSound('click');
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        updatePlayerDOM();

        // Đồng hồ đếm ngược
        timerInterval = setInterval(() => {
            if (gameActive) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame(false);
                }
            }
        }, 1000);
    }

    // Kết thúc Trò chơi (Thắng / Thua)
    function endGame(isWin) {
        gameActive = false;
        clearInterval(timerInterval);
        const endModal = document.getElementById('end-modal');
        
        if (isWin) {
            playSound('win');
            document.getElementById('end-title').innerText = "🎉 CHIẾN THẮNG 🎉";
            document.getElementById('end-message').innerText = `Chúc mừng bạn đã xuất sắc thu thập đủ 5 Mảnh Ký Ức Lịch Sử Việt Nam với thời gian còn lại là ${timeLeft} giây!`;
            startFireworks();
        } else {
            playSound('wrong');
            document.getElementById('end-title').innerText = "⏱️ HẾT GIỜ!";
            document.getElementById('end-message').innerText = "Thời gian tìm kiếm đã cạn kiệt. Hãy thử lại để ghi danh bảng vàng.";
        }
        endModal.style.display = 'flex';
    }

    // Hiệu ứng pháo hoa ăn mừng chiến thắng (Sử dụng Canvas HTML5 độc lập)
    const canvas = document.getElementById('canvas-fw');
    const ctx = canvas.getContext('2d');
    let fwInterval;

    function startFireworks() {
        canvas.style.display = 'block';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        function createExplosion(x, y) {
            const colors = ['#d4af37', '#e74c3c', '#2ecc71', '#3498db', '#f1c40f'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    alpha: 1,
                    color: color
                });
            }
        }

        fwInterval = setInterval(() => {
            createExplosion(Math.random() * canvas.width, Math.random() * (canvas.height * 0.6));
        }, 400);

        function updateFw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.015;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                if (p.alpha <= 0) particles.splice(idx, 1);
            });
            requestAnimationFrame(updateFw);
        }
        updateFw();
    }

    // Tự động dựng tài nguyên khi trình duyệt tải xong trang
    initMap();
</script>
</body>
</html>
